set -g default-terminal screen-256color
set -g mouse on
set -g history-limit 10000000  # Increase buffer size

unbind C-b
set -g prefix C-a

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Enable automatic rename
set-option -g allow-rename on
set-option -g automatic-rename on
set-option -g automatic-rename-format '#{b:pane_current_path}'

# Restart with confirmation
bind r confirm-before -p "Restart pane? (y/n)" "respawn-pane -k"

bind R source-file ~/.tmux.conf

### region styling
# Pane borders - show current command and path
set -g pane-border-status bottom
set -g pane-border-format " #{pane_index}: #{b:pane_current_path} | #{pane_current_command} "
# https://github.com/sbernheim4/dotfiles/blob/master/tmux/.tmux.conf
# statusbar
set -g status-left-length 30
set-option -g status-style bg=colour237,fg=colour223
set-option -g status-position bottom
set -g status-right 'Continuum status: #{continuum_status}'

# use current path when creating new window
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

bind h previous-window
bind l next-window

# ─── Window Swap (Move Left / Right) ──────────────────────────────────────────
# Swap current window with the one to the LEFT  →  Prefix + Shift+H  (<)
bind-key -r H swap-window -t -1 \; select-window -t -1

# Swap current window with the one to the RIGHT →  Prefix + Shift+L
bind-key -r L swap-window -t +1 \; select-window -t +1

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'
set -g @continuum-boot 'off'
# set -g @continuum-boot-options 'iterm'
set -g @continuum-save-interval '10'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
